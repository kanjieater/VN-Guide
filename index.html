<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YU-NO Guide</title>
<style>:root {
            --bg: #121212;
            --text: #e0e0e0;
            --accent: #4a90e2;
            --surface: #1e1e1e;
            --border: #333;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
        }

#app {
            width: 100%;
            max-width: 600px;
            height: 100dvh; /* Changed from 100vh */
            display: flex;
            flex-direction: column;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        button {
            background-color: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 20px 15px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            touch-action: manipulation;
            word-wrap: break-word;
        }
        button:active { background-color: #2a2a2a; }
        button:disabled { opacity: 0.3; pointer-events: none; }
        button.primary { background-color: var(--accent); color: white; border: none; }
        button.primary:active { background-color: #357abd; }

        #view-home, #view-jump {
            height: 100%;
            overflow-y: auto;
            padding: 20px 0;
        }
        #view-slide:not(.hidden) {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
            flex-shrink: 0;
        }
        .view-header button {
            padding: 15px;
            font-size: 16px;
        }

        .route-card {
            background: var(--surface);
            padding: 20px 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .route-card button {
            padding: 15px 25px;
        }

        .step-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 20px 0;
        }

        .simple-instruction {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .details-section {
            background: var(--surface);
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 16px;
            border: 1px solid var(--border);
            line-height: 1.6;
        }
        .details-section div { margin-bottom: 15px; }
        .details-section div:last-child { margin-bottom: 0; }
        .details-section strong { color: var(--accent); display: block; margin-bottom: 5px; }

        .nav-buttons {
            flex-shrink: 0;
            display: flex;
            gap: 15px;
            padding: 15px 0;
            background-color: var(--bg);
            border-top: 1px solid var(--border);
        }
        .nav-buttons button {
            flex: 1;
            font-size: 28px;
            height: 20dvh;
            min-height: 120px;
        }

        .jump-list { list-style: none; padding: 0; margin: 0; }
        .jump-list li {
            padding: 20px 10px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 18px;
            line-height: 1.4;
        }
        .jump-list li:active { background: var(--surface); }
        .jump-list li.active { color: var(--accent); font-weight: bold; }
        /* Global Progress Bar */
        .global-progress {
            text-align: center;
            font-weight: bold;
            color: var(--accent);
            padding: 15px 0 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 16px;
            flex-shrink: 0;
        }
        </style>
</head>
<body>

<div id="app">
    <div id="global-progress" class="global-progress"></div>
    <!-- HOME VIEW -->
    <div id="view-home">
        <h2>ルート選択</h2>
        <div id="route-list"></div>
    </div>

    <!-- SLIDESHOW VIEW -->
    <div id="view-slide" class="hidden">
        <div class="view-header">
            <button onclick="goHome()">🏠 戻る</button>
            <h3 id="slide-route-title" style="margin: 0;"></h3>
            <button onclick="showFullRoute()">一覧</button>
        </div>

        <div class="step-container">
            <div id="step-counter" style="color: #888; font-size: 14px; margin-bottom: 10px;"></div>
            <div id="simple-instruction" class="simple-instruction"></div>

            <div>
                <button onclick="toggleDetails()">詳細を表示 / More Details</button>
            </div>

            <div id="details-section" class="details-section hidden">
                <div id="jp-guide-1"></div>
                <div id="jp-guide-2"></div>
                <div id="en-guide"></div>
            </div>
        </div>

        <div class="nav-buttons">
            <button id="btn-prev" onclick="prevStep()">◀ 前へ</button>
            <button id="btn-next" class="primary" onclick="nextStep()">次へ ▶</button>
        </div>
    </div>

    <!-- FULL ROUTE JUMP VIEW -->
    <div id="view-jump" class="hidden">
        <div class="view-header">
            <button onclick="resumeSlide()">◀ 戻る</button>
            <h3 style="margin: 0;">ルート一覧</h3>
            <div style="width: 70px;"></div> <!-- spacer -->
        </div>
        <ul id="jump-list-container" class="jump-list"></ul>
    </div>
</div>

    // --- STATE MANAGEMENT ---
    // --- STATE MANAGEMENT ---
    let state = {
        currentRoute: null,
        progress: {} // Stores step index for each route separately e.g., { "mitsuki": 5, "ayumi": 0 }
    };

    function loadState() {
        const saved = localStorage.getItem('yunoGuideStateV2');
        if (saved) state = JSON.parse(saved);
    }

    function saveState() {
        localStorage.setItem('yunoGuideStateV2', JSON.stringify(state));
        updateGlobalProgress(); // Forces header to update on every save
    }

    // --- VIEW ROUTING ---
    const vHome = document.getElementById('view-home');
    const vSlide = document.getElementById('view-slide');
    const vJump = document.getElementById('view-jump');

    function hideAll() {
        vHome.classList.add('hidden');
        vSlide.classList.add('hidden');
        vJump.classList.add('hidden');
    }

    // --- CONTROLLERS ---
    function init() {
        loadState();
        updateGlobalProgress(); // Run once on startup
        renderHome();
    }
    function updateGlobalProgress() {
        let totalSteps = 0;
        let currentSteps = 0;

        for (const [id, route] of Object.entries(guideData)) {
            totalSteps += route.steps.length;
            if (state.progress[id] !== undefined) {
                currentSteps += (state.progress[id] + 1);
            }
        }

        const percent = totalSteps === 0 ? 0 : Math.round((currentSteps / totalSteps) * 100);
        document.getElementById('global-progress').innerText = `全体進行度: ${percent}%`;
    }
    function renderHome() {
        hideAll();
        vHome.classList.remove('hidden');
        const container = document.getElementById('route-list');
        container.innerHTML = '';

        for (const [id, route] of Object.entries(guideData)) {
            const hasStarted = state.progress[id] !== undefined;
            const stepIndex = hasStarted ? state.progress[id] : 0;
            const totalSteps = route.steps.length;
            const percent = Math.round(((stepIndex + 1) / totalSteps) * 100);

            const progressTxt = hasStarted ? `<div style="color:var(--accent); font-size:14px; margin-top:5px; font-weight:normal;">Step ${stepIndex + 1} / ${totalSteps} (${percent}%)</div>` : '';

            container.innerHTML += `
                <div class="route-card">
                    <div>
                        <div style="font-weight: bold; font-size: 18px;">${route.title}</div>
                        ${progressTxt}
                    </div>
                    <button class="${hasStarted ? 'primary' : ''}" onclick="startRoute('${id}')">
                        ${hasStarted ? '再開' : '開始'}
                    </button>
                </div>
            `;
        }
    }

    function goHome() {
        renderHome();
    }

    function startRoute(id) {
        state.currentRoute = id;
        if (state.progress[id] === undefined) {
            state.progress[id] = 0;
        }
        saveState();
        renderSlide();
    }

    function renderSlide() {
        hideAll();
        vSlide.classList.remove('hidden');
        document.getElementById('details-section').classList.add('hidden');

        const routeId = state.currentRoute;
        const route = guideData[routeId];
        const stepIndex = state.progress[routeId];
        const step = route.steps[stepIndex];
        const totalSteps = route.steps.length;
        const percent = Math.round(((stepIndex + 1) / totalSteps) * 100);

        document.getElementById('slide-route-title').innerText = route.title;
        document.getElementById('step-counter').innerText = `Step ${stepIndex + 1} / ${totalSteps} (${percent}%)`;
        document.getElementById('simple-instruction').innerText = step.simpleJp;

        // Details
        const jp1 = document.getElementById('jp-guide-1');
        const jp2 = document.getElementById('jp-guide-2');
        const en = document.getElementById('en-guide');

        jp1.innerHTML = step.jpGuide1 ? `<strong>JP 1:</strong> ${step.jpGuide1}` : '';
        jp2.innerHTML = step.jpGuide2 ? `<strong>JP 2:</strong> ${step.jpGuide2}` : '';
        en.innerHTML = step.enGuide ? `<strong>EN:</strong> ${step.enGuide}` : '';

        // Nav logic
        document.getElementById('btn-prev').disabled = stepIndex === 0;
        document.getElementById('btn-next').disabled = stepIndex === totalSteps - 1;

        saveState();
    }

    function nextStep() {
        const routeId = state.currentRoute;
        if (state.progress[routeId] < guideData[routeId].steps.length - 1) {
            state.progress[routeId]++;
            renderSlide();
        }
    }

    function prevStep() {
        const routeId = state.currentRoute;
        if (state.progress[routeId] > 0) {
            state.progress[routeId]--;
            renderSlide();
        }
    }

    function toggleDetails() {
        document.getElementById('details-section').classList.toggle('hidden');
    }

    function showFullRoute() {
        hideAll();
        vJump.classList.remove('hidden');

        const routeId = state.currentRoute;
        const route = guideData[routeId];
        const currentIndex = state.progress[routeId];
        const container = document.getElementById('jump-list-container');
        container.innerHTML = '';

        route.steps.forEach((step, index) => {
            const isActive = index === currentIndex ? 'active' : '';
            container.innerHTML += `
                <li class="${isActive}" onclick="jumpTo(${index})">
                    ${index + 1}. ${step.simpleJp}
                </li>
            `;
        });
    }

    function jumpTo(index) {
        state.progress[state.currentRoute] = index;
        renderSlide();
    }

    function resumeSlide() {
        renderSlide();
    }

    // Bootstrap
    init();
</script>
