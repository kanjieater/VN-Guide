<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YU-NO Guide</title>
    <style>
        :root {
            --bg: #121212;
            --text: #e0e0e0;
            --accent: #4a90e2;
            --surface: #1e1e1e;
            --border: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        #app {
            width: 100%;
            max-width: 600px;
        }
        .hidden { display: none !important; }

        button {
            background-color: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
        }
        button:hover { background-color: #2a2a2a; }
        button.primary { background-color: var(--accent); color: white; border: none; }
        button.primary:hover { background-color: #357abd; }

        /* Views */
        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* Route List */
        .route-card {
            background: var(--surface);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Slide Show */
        .step-container {
            text-align: center;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .simple-instruction {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .details-section {
            background: var(--surface);
            padding: 15px;
            border-radius: 4px;
            text-align: left;
            margin-top: 15px;
            font-size: 14px;
            border: 1px solid var(--border);
        }
        .details-section div { margin-bottom: 10px; }
        .details-section strong { color: var(--accent); }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        /* Full Route List */
        .jump-list { list-style: none; padding: 0; }
        .jump-list li {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .jump-list li:hover { background: var(--surface); }
        .jump-list li.active { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <!-- HOME VIEW -->
    <div id="view-home">
        <h2>ルート選択</h2>
        <div id="route-list"></div>
    </div>

    <!-- SLIDESHOW VIEW -->
    <div id="view-slide" class="hidden">
        <div class="view-header">
            <button onclick="goHome()">🏠 戻る</button>
            <h3 id="slide-route-title" style="margin: 0;"></h3>
            <button onclick="showFullRoute()">一覧</button>
        </div>

        <div class="step-container">
            <div id="step-counter" style="color: #888; font-size: 14px; margin-bottom: 10px;"></div>
            <div id="simple-instruction" class="simple-instruction"></div>

            <div>
                <button onclick="toggleDetails()">詳細を表示 / More Details</button>
            </div>

            <div id="details-section" class="details-section hidden">
                <div id="jp-guide-1"></div>
                <div id="jp-guide-2"></div>
                <div id="en-guide"></div>
            </div>
        </div>

        <div class="nav-buttons">
            <button id="btn-prev" onclick="prevStep()">◀ 前へ</button>
            <button id="btn-next" class="primary" onclick="nextStep()">次へ ▶</button>
        </div>
    </div>

    <!-- FULL ROUTE JUMP VIEW -->
    <div id="view-jump" class="hidden">
        <div class="view-header">
            <button onclick="resumeSlide()">◀ 戻る</button>
            <h3 style="margin: 0;">ルート一覧</h3>
            <div style="width: 70px;"></div> <!-- spacer -->
        </div>
        <ul id="jump-list-container" class="jump-list"></ul>
    </div>
</div>

                "jpGuide2": "「石を取る」を選択 「超念石」を入手 「超念石を渡さない」を選択 オフィス：「磁気カード」を使い中に入り 亜由美と会話 エンディング7",
                "enGuide": "- Kaori End 2 (Path B) -\n\"Take the stone\"\n\"Don’t hand it over\" ---> [Hypersense Stone]\n...\n(Use reflector to escape)"
            },
            {
                "simpleJp": "【オフィス】宝玉ロードを使用し、澪ルートへ向かう",
                "jpGuide1": "《宝玉ロード (2) 》を使用して澪ルートへ",
                "jpGuide2": "これで超念石を所持した状態になります（使うのは神奈ルートです） おまけに澪ルートの洞窟内でマップが開けるようになります",

            }
        ]
    },
};
    // --- STATE MANAGEMENT ---
    let currentState = {
        routeId: null,
        stepIndex: 0
    };

    function loadState() {
        const saved = localStorage.getItem('yunoGuideState');
        if (saved) currentState = JSON.parse(saved);
    }

    function saveState() {
        localStorage.setItem('yunoGuideState', JSON.stringify(currentState));
    }

    // --- VIEW ROUTING ---
    const vHome = document.getElementById('view-home');
    const vSlide = document.getElementById('view-slide');
    const vJump = document.getElementById('view-jump');

    function hideAll() {
        vHome.classList.add('hidden');
        vSlide.classList.add('hidden');
        vJump.classList.add('hidden');
    }

    // --- CONTROLLERS ---
    function init() {
        loadState();
        renderHome();
    }

    function renderHome() {
        hideAll();
        vHome.classList.remove('hidden');
        const container = document.getElementById('route-list');
        container.innerHTML = '';

        for (const [id, route] of Object.entries(guideData)) {
            const isResume = currentState.routeId === id;
            const progressTxt = isResume ? `<span style="color:#4a90e2; font-size:12px;">Resume (Step ${currentState.stepIndex + 1})</span>` : '';

            container.innerHTML += `
                <div class="route-card">
                    <div>
                        <div style="font-weight: bold;">${route.title}</div>
                        ${progressTxt}
                    </div>
                    <button class="${isResume ? 'primary' : ''}" onclick="startRoute('${id}')">
                        ${isResume ? '再開' : '開始'}
                    </button>
                </div>
            `;
        }
    }

    function goHome() {
        renderHome();
    }

    function startRoute(id) {
        if (currentState.routeId !== id) {
            currentState.routeId = id;
            currentState.stepIndex = 0;
        }
        saveState();
        renderSlide();
    }

    function renderSlide() {
        hideAll();
        vSlide.classList.remove('hidden');
        document.getElementById('details-section').classList.add('hidden'); // Reset detail view

        const route = guideData[currentState.routeId];
        const step = route.steps[currentState.stepIndex];

        document.getElementById('slide-route-title').innerText = route.title;
        document.getElementById('step-counter').innerText = `Step ${currentState.stepIndex + 1} / ${route.steps.length}`;
        document.getElementById('simple-instruction').innerText = step.simpleJp;

        // Details
        const jp1 = document.getElementById('jp-guide-1');
        const jp2 = document.getElementById('jp-guide-2');
        const en = document.getElementById('en-guide');

        jp1.innerHTML = step.jpGuide1 ? `<strong>JP 1:</strong> ${step.jpGuide1}` : '';
        jp2.innerHTML = step.jpGuide2 ? `<strong>JP 2:</strong> ${step.jpGuide2}` : '';
        en.innerHTML = step.enGuide ? `<strong>EN:</strong> ${step.enGuide}` : '';

        // Nav logic
        document.getElementById('btn-prev').disabled = currentState.stepIndex === 0;
        document.getElementById('btn-next').disabled = currentState.stepIndex === route.steps.length - 1;

        saveState();
    }

    function nextStep() {
        if (currentState.stepIndex < guideData[currentState.routeId].steps.length - 1) {
            currentState.stepIndex++;
            renderSlide();
        }
    }

    function prevStep() {
        if (currentState.stepIndex > 0) {
            currentState.stepIndex--;
            renderSlide();
        }
    }

    function toggleDetails() {
        document.getElementById('details-section').classList.toggle('hidden');
    }

    function showFullRoute() {
        hideAll();
        vJump.classList.remove('hidden');

        const route = guideData[currentState.routeId];
        const container = document.getElementById('jump-list-container');
        container.innerHTML = '';

        route.steps.forEach((step, index) => {
            const isActive = index === currentState.stepIndex ? 'active' : '';
            container.innerHTML += `
                <li class="${isActive}" onclick="jumpTo(${index})">
                    ${index + 1}. ${step.simpleJp}
                </li>
            `;
        });
    }

    function jumpTo(index) {
        currentState.stepIndex = index;
        renderSlide();
    }

    function resumeSlide() {
        renderSlide();
    }

    // Bootstrap
    init();
</script>
</body>
</html>
