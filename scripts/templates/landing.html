<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121212">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;VN Guide&quot;,&quot;short_name&quot;:&quot;VN Guide&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#121212&quot;,&quot;theme_color&quot;:&quot;#121212&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;favicon-192.png&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/png&quot;}]}">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="favicon-192.png">
<title>VN Guide</title>
<style>
  :root {
    --bg: #121212;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #4a90e2;
    --surface: #1e1e1e;
    --border: #333;
    --badge-done: #2a6b2a;
    --badge-done-text: #7ed87e;
    --badge-wip: #3a3a1a;
    --badge-wip-text: #c8b840;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100dvh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 14px;
    text-align: center;
  }

  header h1 {
    margin: 0 0 12px;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  .sort-tabs {
    display: inline-flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .sort-tabs button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    padding: 7px 16px;
    cursor: pointer;
    touch-action: manipulation;
    transition: color 0.15s, background 0.15s;
  }

  .sort-tabs button.active {
    background: var(--accent);
    color: #fff;
  }

  main {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
  }

  .game-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .game-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-decoration: none;
    color: inherit;
    touch-action: manipulation;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .game-card:hover,
  .game-card:focus-visible {
    border-color: var(--accent);
    background: #252535;
    outline: none;
  }

  .game-cover {
    width: 64px;
    height: 90px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    background: var(--border);
  }

  .game-cover-placeholder {
    width: 64px;
    height: 90px;
    border-radius: 6px;
    flex-shrink: 0;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--text-muted);
  }

  .game-info {
    flex: 1;
    min-width: 0;
  }

  .game-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    margin: 0 0 8px;
    word-break: break-word;
  }

  .game-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.02em;
  }

  .badge-guide { background: var(--badge-done); color: var(--badge-done-text); }
  .badge-wip   { background: var(--badge-wip);  color: var(--badge-wip-text);  }

  .game-arrow {
    font-size: 20px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    padding: 60px 16px;
    color: var(--text-muted);
    font-size: 15px;
  }

  footer {
    text-align: center;
    padding: 24px 16px;
    color: var(--text-muted);
    font-size: 11px;
    border-top: 1px solid var(--border);
    max-width: 600px;
    margin: 0 auto;
  }
</style>
</head>
<body>
<header>
  <h1>VN Guide</h1>
  <div class="sort-tabs">
    <button id="btn-recent" class="active" onclick="setSort('recent')">最近</button>
    <button id="btn-alpha"  onclick="setSort('alpha')">あいうえお</button>
  </div>
</header>
<main>
  <div class="game-list" id="game-list"></div>
</main>
<footer>
  <a href="https://github.com/kanjieater/VN-Guide" style="color:inherit;text-decoration:underline">GitHub</a>
  ·
  <a href="https://linktr.ee/KanjiEater" style="color:inherit;text-decoration:underline">KanjiEater</a>
</footer>

<script>
const GAMES = /* GAMES_DATA */;

const VISITED_KEY = "vn-guide-visited";
let sortMode = localStorage.getItem("vn-guide-sort") || "recent";

function getVisited() {
  try { return JSON.parse(localStorage.getItem(VISITED_KEY) || "{}"); } catch { return {}; }
}

function recordVisit(slug) {
  const v = getVisited();
  v[slug] = Date.now();
  localStorage.setItem(VISITED_KEY, JSON.stringify(v));
}

function displayName(g) {
  return g.alttitle || g.title;
}

function sortedGames() {
  const visited = getVisited();
  const games = [...GAMES];
  if (sortMode === "recent") {
    games.sort((a, b) => {
      const va = visited[a.slug] || 0;
      const vb = visited[b.slug] || 0;
      if (vb !== va) return vb - va;
      return displayName(a).localeCompare(displayName(b), "ja");
    });
  } else {
    games.sort((a, b) => displayName(a).localeCompare(displayName(b), "ja"));
  }
  return games;
}

function renderCard(g) {
  const name = displayName(g);
  const img = g.cover_url
    ? `<img class="game-cover" src="${g.cover_url}" alt="" loading="lazy">`
    : `<div class="game-cover-placeholder">📖</div>`;
  const badge = g.has_guide
    ? `<span class="game-badge badge-guide">Guide Available</span>`
    : `<span class="game-badge badge-wip">Coming Soon</span>`;
  return `<a class="game-card" href="./${g.slug}/" onclick="recordVisit('${g.slug}')">
  ${img}
  <div class="game-info">
    <p class="game-title">${name}</p>
    ${badge}
  </div>
  <span class="game-arrow">›</span>
</a>`;
}

function render() {
  const list = document.getElementById("game-list");
  const games = sortedGames();
  list.innerHTML = games.length
    ? games.map(renderCard).join("\n")
    : `<div class="empty-state">プレイ中のゲームがありません</div>`;
  document.getElementById("btn-recent").classList.toggle("active", sortMode === "recent");
  document.getElementById("btn-alpha").classList.toggle("active", sortMode === "alpha");
}

function setSort(mode) {
  sortMode = mode;
  localStorage.setItem("vn-guide-sort", mode);
  render();
}

render();
</script>
</body>
</html>
