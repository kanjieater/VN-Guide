<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121212">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;VN Guide&quot;,&quot;short_name&quot;:&quot;VN Guide&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#121212&quot;,&quot;theme_color&quot;:&quot;#121212&quot;}">
<title>VN Guide</title>
<style>
  :root {
    --bg: #121212;
    --text: #e0e0e0;
    --accent: #4a90e2;
    --surface: #1e1e1e;
    --border: #333;
    --nav-h: 20dvh;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    height: 100dvh;
  }

  #app {
    max-width: 600px;
    margin: 0 auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── views ──────────────────────────────────────────── */
  .view { display: none; flex-direction: column; height: 100%; overflow: hidden; }
  .view.active { display: flex; }

  /* ── home view ──────────────────────────────────────── */
  #view-home {
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    text-align: center;
    gap: 16px;
  }

  #view-home h2 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  #view-home p {
    margin: 0;
    color: #888;
    font-size: 15px;
    line-height: 1.6;
  }

  #route-list {
    width: 100%;
    list-style: none;
    margin: 0; padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #route-list li button {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    padding: 20px;
    cursor: pointer;
    touch-action: manipulation;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #route-list li button:active { background: #2a2a3a; }

  /* ── slide view ─────────────────────────────────────── */
  #view-slide { justify-content: space-between; }

  .view-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .view-header h3 {
    flex: 1;
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .view-header button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
    flex-shrink: 0;
    touch-action: manipulation;
  }

  .step-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #step-counter {
    font-size: 13px;
    color: #888;
    text-align: center;
  }

  #simple-instruction {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.4;
    text-align: center;
  }

  #details-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    display: none;
  }

  #details-section h4 {
    margin: 0 0 6px;
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  #details-section .detail-block + .detail-block { margin-top: 12px; }

  button#toggle-details {
    background: none;
    border: 1px solid var(--border);
    color: #888;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    align-self: center;
    touch-action: manipulation;
  }

  .nav-buttons {
    display: flex;
    gap: 8px;
    padding: 10px;
    flex-shrink: 0;
  }

  .nav-buttons button {
    flex: 1;
    height: var(--nav-h);
    min-height: 80px;
    border: none;
    border-radius: 10px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
    background: var(--surface);
    color: var(--text);
  }

  .nav-buttons button.primary {
    background: var(--accent);
    color: #fff;
  }

  .nav-buttons button:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* ── jump view ──────────────────────────────────────── */
  #view-jump { overflow: hidden; }

  #jump-list-container {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  #jump-list {
    list-style: none;
    margin: 0; padding: 0;
  }

  #jump-list li button {
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    text-align: left;
    padding: 14px 12px;
    font-size: 14px;
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    gap: 10px;
    align-items: baseline;
  }

  #jump-list li button:active { background: var(--surface); }

  .jump-num {
    font-size: 12px;
    color: #888;
    flex-shrink: 0;
    width: 28px;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Home: route selection -->
  <div id="view-home" class="view active">
    <h2 id="game-title"></h2>
    <p id="home-status">ガイド作成中…<br>しばらくお待ちください</p>
    <ul id="route-list"></ul>
    <a href="../" style="color:#888;font-size:13px;margin-top:8px;">← ホームへ戻る</a>
  </div>

  <!-- Slide: step-by-step reader -->
  <div id="view-slide" class="view">
    <div class="view-header">
      <button onclick="goHome()">🏠</button>
      <h3 id="slide-route-title"></h3>
      <button onclick="showJump()">一覧</button>
    </div>
    <div class="step-container">
      <div id="step-counter"></div>
      <div id="simple-instruction"></div>
      <button id="toggle-details" onclick="toggleDetails()">詳細を表示</button>
      <div id="details-section">
        <div class="detail-block" id="detail-jp1"></div>
        <div class="detail-block" id="detail-jp2"></div>
        <div class="detail-block" id="detail-en"></div>
      </div>
    </div>
    <div class="nav-buttons">
      <button id="btn-prev" onclick="prevStep()">◀ 前へ</button>
      <button id="btn-next" onclick="nextStep()" class="primary">次へ ▶</button>
    </div>
  </div>

  <!-- Jump: full step list -->
  <div id="view-jump" class="view">
    <div class="view-header">
      <button onclick="resumeSlide()">◀ 戻る</button>
      <h3 id="jump-route-title"></h3>
    </div>
    <div id="jump-list-container">
      <ul id="jump-list"></ul>
    </div>
  </div>

</div>
<script>
// ── App state ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = "guide_" + location.pathname.replace(/\//g, "_");

let guideData = { routes: [] };
let state = { currentRoute: null, progress: {} };

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) state = JSON.parse(s); } catch {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// ── View management ───────────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ── Home ──────────────────────────────────────────────────────────────────────
async function init() {
  loadState();
  try {
    const res = await fetch("./guide.json");
    if (res.ok) {
      guideData = await res.json();
      if (guideData.title) document.title = guideData.title + " ガイド";
    }
  } catch {}
  renderHome();
  requestWakeLock();
}

function renderHome() {
  const list = document.getElementById("route-list");
  const status = document.getElementById("home-status");
  const titleEl = document.getElementById("game-title");
  if (titleEl && guideData.title) titleEl.textContent = guideData.title;
  if (!guideData.routes || guideData.routes.length === 0) {
    list.innerHTML = "";
    status.style.display = "";
    showView("view-home");
    return;
  }
  status.style.display = "none";
  list.innerHTML = guideData.routes.map(r => {
    const prog = state.progress[r.id] || 0;
    const pct = r.steps.length ? Math.round(prog / r.steps.length * 100) : 0;
    return `<li><button onclick="startRoute('${r.id}')">
      <span>${r.title}</span>
      <span style="font-size:13px;color:#888;font-weight:400">${pct}%</span>
    </button></li>`;
  }).join("");
  showView("view-home");
}

function startRoute(id) {
  state.currentRoute = id;
  if (!(id in state.progress)) state.progress[id] = 0;
  saveState();
  renderSlide();
}

// ── Slide ─────────────────────────────────────────────────────────────────────
function currentRoute() {
  return guideData.routes.find(r => r.id === state.currentRoute);
}

function renderSlide() {
  const route = currentRoute();
  if (!route) { renderHome(); return; }
  const idx = state.progress[route.id] || 0;
  const step = route.steps[idx];
  const total = route.steps.length;

  document.getElementById("slide-route-title").textContent = route.title;
  document.getElementById("step-counter").textContent = `${idx + 1} / ${total} (${Math.round((idx + 1) / total * 100)}%)`;
  document.getElementById("simple-instruction").textContent = step.simpleJp || "";

  const hasDetails = step.jpGuide1 || step.jpGuide2 || step.enGuide;
  document.getElementById("toggle-details").style.display = hasDetails ? "" : "none";
  document.getElementById("details-section").style.display = "none";
  document.getElementById("toggle-details").textContent = "詳細を表示";

  const setDetail = (id, label, text) => {
    const el = document.getElementById(id);
    el.style.display = text ? "" : "none";
    if (text) el.innerHTML = `<h4>${label}</h4>${escHtml(text)}`;
  };
  setDetail("detail-jp1", "攻略サイト①", step.jpGuide1 || "");
  setDetail("detail-jp2", "攻略サイト②", step.jpGuide2 || "");
  setDetail("detail-en", "English", step.enGuide || "");

  document.getElementById("btn-prev").disabled = idx === 0;
  document.getElementById("btn-next").disabled = idx === total - 1;

  showView("view-slide");
}

function nextStep() {
  const route = currentRoute();
  if (!route) return;
  const idx = state.progress[route.id] || 0;
  if (idx < route.steps.length - 1) {
    state.progress[route.id] = idx + 1;
    saveState();
    renderSlide();
  }
}

function prevStep() {
  const route = currentRoute();
  if (!route) return;
  const idx = state.progress[route.id] || 0;
  if (idx > 0) {
    state.progress[route.id] = idx - 1;
    saveState();
    renderSlide();
  }
}

function toggleDetails() {
  const sec = document.getElementById("details-section");
  const btn = document.getElementById("toggle-details");
  const open = sec.style.display !== "none";
  sec.style.display = open ? "none" : "";
  btn.textContent = open ? "詳細を表示" : "詳細を隠す";
}

function goHome() {
  state.currentRoute = null;
  saveState();
  renderHome();
}

// ── Jump list ─────────────────────────────────────────────────────────────────
function showJump() {
  const route = currentRoute();
  if (!route) return;
  document.getElementById("jump-route-title").textContent = route.title;
  const list = document.getElementById("jump-list");
  list.innerHTML = route.steps.map((s, i) =>
    `<li><button onclick="jumpTo(${i})">
      <span class="jump-num">${i + 1}</span>
      <span>${escHtml(s.simpleJp || "")}</span>
    </button></li>`
  ).join("");
  showView("view-jump");
}

function jumpTo(idx) {
  const route = currentRoute();
  if (!route) return;
  state.progress[route.id] = idx;
  saveState();
  renderSlide();
}

function resumeSlide() { renderSlide(); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

let wakeLock = null;
async function requestWakeLock() {
  try { wakeLock = await navigator.wakeLock.request("screen"); } catch {}
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") requestWakeLock();
});

init();
</script>
</body>
</html>
